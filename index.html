// Generate a random letter-based ID (e.g., WPT-KRD-MBX-FLQ)
function generateLetterID() {
    var letters = 'ABCDEFGHJKLMNPQRSTUVWXYZ'; // Removed I and O to avoid confusion with 1 and 0
    var group = function() {
        var result = '';
        for (var i = 0; i < 3; i++) {
            result += letters.charAt(Math.floor(Math.random() * letters.length));
        }
        return result;
    };
    return 'WPT-' + group() + '-' + group() + '-' + group();
}

];

function generateTrials() {
    var allTrials = [];
    for (var t = 0; t < trialStructure.length; t++) {
        var structure = trialStructure[t];
        var pattern = structure[0];
        var cards = structure[1].slice();
        var sunCount = structure[2];
        var rainCount = structure[3];

        for (var i = 0; i < sunCount; i++) {
            allTrials.push({
                pattern: pattern,
                cards: cards.slice(),
                correctOutcome: 'sun'
            });
        }
        for (var i = 0; i < rainCount; i++) {
            allTrials.push({
                pattern: pattern,
                cards: cards.slice(),
                correctOutcome: 'rain'
            });
        }
    }
    return jsPsych.randomization.shuffle(allTrials);
}
